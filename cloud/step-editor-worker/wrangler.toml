name = "step-editor-files"
main = "src/index.js"
compatibility_date = "2025-01-01"

# Replace `id` with the KV namespace id wrangler prints after you run:
#   npx wrangler kv:namespace create STEP_FILES
# (You'll get something like: id = "abc123…"). Leaving the placeholder here
# lets the dev server boot against `npx wrangler kv:namespace create … --preview`.
[[kv_namespaces]]
binding = "STEP_FILES"
id      = "REPLACE_AFTER_KV_CREATE"
preview_id = "REPLACE_AFTER_KV_CREATE_PREVIEW"

# When you're ready to give it a friendly hostname (e.g. files.step-editor.com)
# wire up routes here. Until then the default *.workers.dev URL is fine.
# [[routes]]
# pattern = "files.step-editor.example.com/*"
# zone_name = "step-editor.example.com"
