<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Frame Inspector</title>
    <style>
        body {
            font-family: "Segoe UI", Arial, sans-serif;
            background: #f4f4f4;
            color: #222;
            margin: 0;
            padding: 10px;
            min-width: 300px;
        }
        #pulse-box {
            background: #eee;
            border: 1px solid #ccc;
            padding: 4px 8px;
            font-size: 0.8em;
            color: #0077c8;
            font-weight: bold;
            margin-bottom: 10px;
            border-radius: 4px;
            text-align: center;
        }
        #debug {
            display: none;
        }
        h2 {
            font-size: 1.1em;
            color: #0077c8;
            margin: 12px 0 6px 0;
            border-bottom: 2px solid #0077c8;
            padding-bottom: 2px;
        }
        .main-feature { font-weight: bold; font-size: 1.1em; margin: 15px 0 2px 0; color: #222; }
        .coord { color: #666; font-size: 0.95em; margin-bottom: 8px; }
        .linked-label { margin: 12px 0 4px 0; font-weight: 600; color: #0077c8; font-size: 0.9em; text-transform: uppercase; }
        .linked-list { margin: 0 0 10px 10px; padding: 0; font-size: 0.95em; }
        .linked-list li { margin-bottom: 2px; list-style: decimal inside; }
        .meta { color: #888; font-size: 0.85em; margin-top: 15px; font-family: 'Consolas', monospace; border-top: 1px solid #ddd; padding-top: 8px; }
        #copy-btn, #copy-short-btn {
            display: inline-block;
            width: 48%;
            margin-top: 12px;
            padding: 8px 0;
            background: #0077c8;
            color: #fff;
            border: none;
            border-radius: 4px;
            font-size: 0.9em;
            font-family: "Segoe UI", Arial, sans-serif;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.02em;
        }
        #copy-btn:hover, #copy-short-btn:hover { background: #005fa3; }
        #copy-btn.ok, #copy-short-btn.ok { background: #388E3C; }
        #copy-btn.err, #copy-short-btn.err { background: #c0392b; }
        
        .btn-container { display: flex; justify-content: space-between; gap: 4%; }
    </style>
</head>
<body>
    <div id="pulse-box">Bridge: WAITING...</div>
    <div id="debug">JS init...</div>
    <div id="main-feature" class="main-feature">Select geometry...</div>
    <div id="coord" class="coord"></div>
    <div id="meta-text" class="meta"></div>
    <div id="linked-root" style="display:none;">
        <div class="linked-label" id="list-label">Connections</div>
        <ul id="linked-list" class="linked-list"></ul>
    </div>
    
    <div style="margin-top: 12px; display:flex; align-items:center; justify-content:space-between; gap:8px;">
        <label style="font-size:0.9em; color:#444; display:flex; align-items:center; gap:6px;">
            <input id="expr-toggle" type="checkbox"> Expression coords
        </label>
        <div class="btn-container" style="flex:1; justify-content:flex-end; gap:4px;">
            <button type="button" id="copy-btn" title="Copy everything">Full Copy</button>
            <button type="button" id="copy-short-btn" title="Copy name only">Copy Name</button>
        </div>
    </div>

    <script>
        var updateCount = 0;
        var pollCount = 0;

        function dlog(msg) {
            // Debug logging disabled for normal operation.
        }

        function reportError(message, source, lineno, colno, error) {
            dlog('JS ERROR: ' + message + ' @' + source + ':' + lineno + ':' + colno);
            if (error && error.stack) {
                dlog('STACK: ' + error.stack.split('\n')[0]);
            }
            return false;
        }

        function renderItemList(data, useExpr) {
            var list = document.getElementById('linked-list');
            var root = document.getElementById('linked-root');
            if (!list) return;
            list.innerHTML = '';
            var items = data.items || [];
            if (items && items.length > 0) {
                if (root) root.style.display = 'block';
                for (var i = 0; i < items.length; i++) {
                    var item = items[i] || {};
                    var detail = useExpr ? item.coordExpr || '' : item.coord || '';
                    if (item.meta) {
                        detail = detail ? detail + ' | ' + item.meta : item.meta;
                    }
                    var li = document.createElement('li');
                    var strong = document.createElement('strong');
                    strong.textContent = item.name || '';
                    li.appendChild(strong);
                    if (detail) {
                        li.appendChild(document.createTextNode(' (' + detail + ')'));
                    }
                    list.appendChild(li);
                }
            } else {
                if (root) root.style.display = 'none';
            }
        }

        function reportError(message, source, lineno, colno, error) {
            dlog('JS ERROR: ' + message + ' @' + source + ':' + lineno + ':' + colno);
            if (error && error.stack) {
                dlog('STACK: ' + error.stack.split('\n')[0]);
            }
            return false;
        }

        function renderLinkedList(data, useExpr) {
            var list = document.getElementById('linked-list');
            var root = document.getElementById('linked-root');
            if (!list) return;
            list.innerHTML = '';
            var entries = useExpr && data.linked_expr && data.linked_expr.length > 0 ? data.linked_expr : data.linked;
            if (entries && entries.length > 0) {
                if (root) root.style.display = 'block';
                for (var i = 0; i < entries.length; i++) {
                    var li = document.createElement('li');
                    li.textContent = entries[i];
                    list.appendChild(li);
                }
            } else {
                if (root) root.style.display = 'none';
            }
        }

        function applyData(dataStr, source) {
            updateCount++;
            document.getElementById('pulse-box').textContent = 'Bridge: LIVE (' + updateCount + ') [' + source + ']';
            document.getElementById('pulse-box').style.color = '#388E3C';
            document.getElementById('pulse-box').style.background = '#E8F5E9';
            try {
                dlog('APPLY start source=' + source + ' len=' + (dataStr ? dataStr.length : 0));
                var d = (typeof dataStr === 'string') ? JSON.parse(dataStr) : dataStr;
                currentData = d;
                dlog('APPLY data main=' + (d.mainFeature || '<none>') + ' coord=' + (d.coord || '<none>') + ' coord_expr=' + (d.coord_expr || '<none>') + ' count=' + (d.count || 0));
                document.getElementById('main-feature').textContent = d.mainFeature || 'Entity';
                currentData = d;
                updateCoordDisplay();

                var listLabel = document.getElementById('list-label');
                if (listLabel) listLabel.textContent = d.listLabel || 'Connections';
                var showExpr = document.getElementById('expr-toggle') && document.getElementById('expr-toggle').checked;
                renderLinkedList(d, showExpr);
                document.getElementById('meta-text').textContent = d.meta || '';
            } catch(e) {
                dlog('PARSE ERR: ' + e.message);
            }
        }

        // Channel A: Python pushes via sendInfoToHTML
        window.fusionJavaScriptHandler = function(action, data) {
            dlog('PUSH start action=' + action + ' len=' + (data ? data.length : 0));
            if (action === 'update' && data) {
                applyData(data, 'PUSH');
            } else {
                dlog('PUSH ignored unknown action=' + action);
            }
        };

        // Pending copy job queued by button click, consumed by next poll tick.
        // adsk.fusionSendData only delivers messages reliably from setInterval
        // callbacks, NOT from DOM click handlers — so we piggyback onto the
        // existing poll cycle instead of calling it directly from the click.
        var _pendingCopy = null;  // { text, btn, original }

        // Channel B: JS polls Python via fusionSendData (returns Promise)
        function poll() {
            pollCount++;
            if (typeof adsk === 'undefined') {
                dlog('POLL deferred: adsk not ready');
                return;
            }
            try {
                // If a copy was queued by a button click, send it now via the
                // reliable setInterval-driven message pump.
                var job = _pendingCopy;
                if (job) { _pendingCopy = null; }

                var action = job ? 'copy' : 'poll';
                var data   = job ? job.text : 'ping';

                dlog(job ? ('COPY via poll start len=' + data.length) : ('POLL start #' + pollCount));
                var result = adsk.fusionSendData(action, data);

                if (result && typeof result.then === 'function') {
                    result.then(function(resp) {
                        if (job) {
                            dlog('COPY result=' + resp);
                            flashBtn(job.btn, resp === 'ok' ? 'Copied!' : 'Error',
                                             resp === 'ok', job.original);
                        } else {
                            dlog('POLL result len=' + (resp ? resp.length : 0));
                            if (resp && resp.length > 5) { applyData(resp, 'POLL'); }
                        }
                    }).catch(function(err) {
                        var tag = job ? 'COPY' : 'POLL';
                        dlog(tag + ' ERR: ' + (err && err.message ? err.message : err));
                        if (job) { flashBtn(job.btn, 'Error', false, job.original); }
                    });
                } else {
                    // Synchronous path (older Fusion builds)
                    if (job) {
                        dlog('COPY sync result=' + result);
                        flashBtn(job.btn, result === 'ok' ? 'Copied!' : 'Error',
                                         result === 'ok', job.original);
                    } else if (typeof result === 'string' && result.length > 5) {
                        applyData(result, 'POLL');
                    }
                }
            } catch(e) {
                dlog('POLL/COPY ERR: ' + (e && e.message ? e.message : e));
            }
        }

        var currentData = null;

        function normalizeEntityName(raw) {
            if (!raw) return '';
            var name = raw.split(' | ')[0].trim();
            return name;
        }

        function updateCoordDisplay() {
            if (!currentData) {
                dlog('DISPLAY skipped: no currentData');
                return;
            }
            var coordEl = document.getElementById('coord');
            if (!coordEl) {
                dlog('DISPLAY failed: coord element missing');
                return;
            }
            var exprToggle = document.getElementById('expr-toggle');
            var showExpr = exprToggle && exprToggle.checked;
            var displayText = '';
            if (showExpr) {
                if (currentData.coord_expr) {
                    displayText = currentData.coord_expr;
                } else {
                    displayText = currentData.coord || '';
                    dlog('DISPLAY expr requested but coord_expr empty, falling back to coord');
                }
            } else {
                displayText = currentData.coord || '';
            }
            coordEl.textContent = displayText;
            renderLinkedList(currentData, showExpr);
            dlog('DISPLAY coord=' + displayText + ' showExpr=' + showExpr + ' coord_expr=' + (currentData.coord_expr ? 'yes' : 'no'));
        }

        function copyShort() {
            var btn = document.getElementById('copy-short-btn');
            dlog('COPY_SHORT clicked');
            if (!currentData) { flashBtn(btn, 'Nothing', false); return; }
            
            var text = "";
            if (currentData.items && currentData.items.length > 0) {
                var names = [];
                for (var i = 0; i < currentData.items.length; i++) {
                    names.push(currentData.items[i].name || '');
                }
                text = names.join('\n');
            } else {
                text = normalizeEntityName(currentData.mainFeature || 'Entity');
            }
            performCopy(text, btn);
        }

        function copyToClipboard() {
            var btn = document.getElementById('copy-btn');
            dlog('COPY_ALL clicked');
            if (!currentData) { flashBtn(btn, 'Nothing', false); return; }

            // Build plain text
            var lines = [];
            if (currentData.count > 1 && currentData.linked) {
                // Batch Mode: Copy the full detailed list
                lines.push(currentData.mainFeature);
                var exprToggle = document.getElementById('expr-toggle');
                var showExpr = exprToggle && exprToggle.checked;
                var entries = showExpr && currentData.linked_expr && currentData.linked_expr.length === currentData.linked.length ? currentData.linked_expr : currentData.linked;
                for (var i = 0; i < entries.length; i++) lines.push(entries[i]);
            } else {
                // Single Mode
                lines.push(currentData.mainFeature || '');
                var exprToggle = document.getElementById('expr-toggle');
                var showExpr = exprToggle && exprToggle.checked;
                if (showExpr && currentData.coord_expr) {
                    lines.push(currentData.coord_expr);
                } else if (showExpr && !currentData.coord_expr && currentData.coord) {
                    lines.push(currentData.coord);
                    dlog('COPY_ALL: expr requested but coord_expr empty, using coord fallback');
                } else if (currentData.coord) {
                    lines.push(currentData.coord);
                }
                if (currentData.linked && currentData.linked.length > 0) {
                    lines.push('Connections:');
                    for (var j = 0; j < currentData.linked.length; j++) lines.push('  ' + currentData.linked[j]);
                }
            }
            var text = lines.join('\n');
            dlog('COPY_ALL text len=' + text.length + ' showExpr=' + (document.getElementById('expr-toggle') && document.getElementById('expr-toggle').checked));
            performCopy(text, btn);
        }

        function performCopy(text, btn) {
            if (!text) { flashBtn(btn, 'Nothing', false); return; }
            var originalText = btn.textContent;
            dlog('PERFORM_COPY len=' + text.length + ' btn=' + (btn ? btn.id : '?'));

            if (typeof adsk !== 'undefined' && typeof adsk.fusionSendData === 'function') {
                // Queue for the next poll tick — adsk.fusionSendData only delivers
                // reliably from setInterval, not from DOM click handlers.
                _pendingCopy = { text: text, btn: btn, original: originalText };
                flashBtn(btn, '...', true, originalText);  // instant click feedback
                dlog('PERFORM_COPY queued for poll delivery');
            } else {
                // Outside Fusion (standalone HTML testing) — try execCommand
                try {
                    var ta = document.createElement('textarea');
                    ta.value = text;
                    ta.style.cssText = 'position:fixed;top:-9999px;left:-9999px';
                    document.body.appendChild(ta);
                    ta.select(); ta.setSelectionRange(0, ta.value.length);
                    var ok = document.execCommand('copy');
                    document.body.removeChild(ta);
                    flashBtn(btn, ok ? 'Copied!' : 'Error', ok, originalText);
                } catch(e) {
                    flashBtn(btn, 'Error', false, originalText);
                }
            }
        }

        function flashBtn(btn, msg, success, originalText) {
            var old = originalText || btn.textContent;
            btn.textContent = msg;
            btn.className = success ? 'ok' : 'err';
            setTimeout(function(){ btn.textContent = old; btn.className = ''; }, 1500);
        }

        function attachUIEvents() {
            var exprToggle = document.getElementById('expr-toggle');
            if (exprToggle) exprToggle.addEventListener('change', updateCoordDisplay);
            var copyBtn = document.getElementById('copy-btn');
            if (copyBtn) copyBtn.addEventListener('click', copyToClipboard);
            var copyShortBtn = document.getElementById('copy-short-btn');
            if (copyShortBtn) copyShortBtn.addEventListener('click', copyShort);
            dlog('DOM ready: events attached');
        }

        function init() {
            attachUIEvents();
            if (typeof adsk !== 'undefined') {
                dlog('JS ready. adsk=' + (typeof adsk));
                poll();
            } else {
                dlog('JS ready. adsk=undefined');
            }
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
        setInterval(poll, 2000);

        window.onerror = function(message, source, lineno, colno, error) {
            reportError(message, source, lineno, colno, error);
            return false;
        };
        window.onunhandledrejection = function(event) {
            dlog('UnhandledPromiseRejection: ' + (event.reason && event.reason.message ? event.reason.message : event.reason));
        };
    </script>
</body>
</html>
