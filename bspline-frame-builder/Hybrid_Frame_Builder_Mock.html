<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Frame Builder · Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <style>
        /* INLINED NATIVE CAD DESIGN SYSTEM EXTRACT */
        :root {
            --cad-accent-blue: #0696D7;
            --cad-accent-green: #10b981;
            --cad-bg-shell: #f5f5f5;
            --cad-bg-sidebar: #edeef0;
            --cad-border-soft: rgba(0,0,0,0.08);
            --cad-font: 'Inter', sans-serif;
        }
        body { margin: 0; padding: 0; font-family: var(--cad-font); background: var(--cad-bg-shell); height: 100vh; overflow: hidden; }
        .cad-app-shell { display: flex; flex-direction: column; height: 100vh; }
        .cad-navbar { height: 36px; background: #fff; border-bottom: 1px solid var(--cad-border-soft); display: flex; align-items: center; padding: 0 16px; z-index: 100; }
        .cad-nav-title { font-weight: 800; font-size: 13px; color: #1e40af; letter-spacing: -0.01em; margin-right: 24px; }
        .cad-nav-links { display: flex; gap: 16px; align-items: center; }
        .cad-nav-link { font-size: 11px; font-weight: 600; color: #666; text-decoration: none; padding: 4px 8px; border-radius: 4px; transition: 0.2s; }
        .cad-nav-link.active { color: #1d4ed8; background: #eff6ff; }
        .cad-app-body { display: flex; flex: 1; overflow: hidden; }
        .cad-app-sidebar { width: 300px; background: var(--cad-bg-sidebar); border-right: 1px solid var(--cad-border-soft); display: flex; flex-direction: column; overflow-y: auto; }
        .cad-workspace { flex: 1; position: relative; background: #fff; display: flex; align-items: center; justify-content: center; }
        .cad-sidebar-panel { margin-bottom: 1px; background: transparent; }
        .cad-accordion-header { padding: 8px 12px; background: #e5e7eb; font-size: 10px; font-weight: 800; color: #4b5563; text-transform: uppercase; letter-spacing: 0.05em; display: flex; align-items: center; cursor: pointer; }
        .cad-accordion-header.dark { background: #d1d5db; color: #374151; }
        .cad-accordion-icon { font-size: 14px; margin-right: 6px; }
        .cad-dialog-content { padding: 12px; background: #fdfdfd; }
        .cad-field-row { display: grid; grid-template-columns: 110px 1fr; align-items: center; gap: 8px; margin-bottom: 12px; }
        .cad-label { font-size: 11px; color: #333; font-weight: 500; }
        .cad-btn { height: 26px; padding: 0 16px; border: 1px solid #ccc; background: #fff; font-size: 11px; font-weight: 600; color: #333; border-radius: 4px; cursor: pointer; transition: 0.2s; display: inline-flex; align-items: center; justify-content: center; }
        .cad-btn-primary { background: var(--cad-accent-blue); color: #fff; border-color: #057fb5; box-shadow: 0 4px 12px rgba(6, 150, 215, 0.25); }
        .cad-btn-primary:hover { background: #058ac7; box-shadow: 0 6px 16px rgba(6, 150, 215, 0.35); transform: translateY(-1px); }
        .cad-input-group { display: flex; align-items: center; }
        .cad-icon-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: #666; cursor: pointer; border-radius: 4px; }
        .cad-icon-btn:hover { background: rgba(0,0,0,0.05); }
        .cad-slider-row { display: flex; align-items: center; gap: 8px; flex: 1; }
        .cad-slider { flex: 1; height: 4px; appearance: none; background: #ddd; border-radius: 2px; }
        .cad-nested-input { background: #fff; border: 1px solid #ddd; padding: 2px 6px; border-radius: 2px; font-size: 10px; color: #444; }
        .cad-nested-input input { border: none; width: 100%; outline: none; font-size: inherit; text-align: right; }
        .cad-icon-lock { color: #999; cursor: pointer; }
        .cad-icon-lock.locked { color: var(--cad-accent-blue); }

        @keyframes cad-pulse-live {
            0% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.4); transform: scale(1); }
            70% { box-shadow: 0 0 0 8px rgba(16, 185, 129, 0); transform: scale(1.05); }
            100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0); transform: scale(1); }
        }
        .cad-status-light { width: 8px; height: 8px; border-radius: 50%; background: var(--cad-accent-green); animation: cad-pulse-live 2s infinite; }

        .mock-viewport { color: #f0f0f0; font-size: 48px; font-weight: 900; letter-spacing: 0.1em; text-shadow: 0 2px 10px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="cad-app-shell">
        <header class="cad-navbar">
            <div class="cad-nav-group">
                <span class="cad-nav-title">HYBRID FRAME BUILDER</span>
                <nav class="cad-nav-links">
                    <a class="cad-nav-link active" href="#">SKETCH</a>
                    <a class="cad-nav-link" href="#">EXTRUDE</a>
                </nav>
            </div>
            <div style="flex:1;"></div>
            <div style="display:flex; gap:12px; align-items:center;">
                <div class="cad-input-group" style="background: rgba(0,0,0,0.04); border-radius: 4px; padding: 2px 8px; border: 1px solid rgba(0,0,0,0.1); box-shadow: inset 0 1px 3px rgba(0,0,0,0.05);">
                    <span class="cad-icon-btn small">−</span>
                    <div style="display:flex; flex-direction:column; align-items:center; min-width:90px;">
                        <span style="font-size:10px; font-weight:800; color:#444; letter-spacing: 0.05em;">PHASE 05</span>
                        <span style="font-size:8px; color:var(--cad-accent-blue); text-transform: uppercase; font-weight: 700;">p02_05_chain.py</span>
                    </div>
                    <span class="cad-icon-btn small">+</span>
                </div>
                <button class="cad-btn cad-btn-primary">BUILD SKETCH</button>
                <span class="material-symbols-outlined" style="color:#666; cursor:pointer;">settings</span>
            </div>
        </header>

        <div class="cad-app-body">
            <aside class="cad-app-sidebar">
                <section class="cad-sidebar-panel">
                    <div class="cad-accordion-header">
                        <span class="material-symbols-outlined cad-accordion-icon">arrow_drop_down</span>
                        TEMPLATE SELECTION
                    </div>
                    <div class="cad-dialog-content">
                        <div class="cad-field-row">
                            <label class="cad-label">Rule Set</label>
                            <div style="background:#fff; border:1px solid #ccc; padding:4px 8px; font-size:11px; border-radius:2px; display:flex; align-items:center; justify-content:space-between;">
                                <span>T2 - Parametric Hub</span>
                                <span style="font-size:10px;">▼</span>
                            </div>
                        </div>
                        <div class="cad-field-row" style="margin-top: -4px;">
                            <span style="font-size:10px; font-weight:800; color:var(--cad-accent-green);">3/3 CONSTRAINED</span>
                        </div>
                    </div>
                </section>

                <section class="cad-sidebar-panel">
                    <div class="cad-accordion-header dark">
                        <span class="material-symbols-outlined cad-accordion-icon">arrow_drop_down</span>
                        ANATOMICAL FACTORS
                    </div>
                    <div class="cad-dialog-content">
                        <div class="cad-field-row">
                            <label class="cad-label">Hub Offset</label>
                            <div class="cad-slider-row">
                                <input type="range" class="cad-slider" value="45">
                                <div class="cad-nested-input"><input type="text" value="0.45" readonly></div>
                                <div class="cad-icon-lock locked"><span class="material-symbols-outlined" style="font-size:14px;">lock</span></div>
                            </div>
                        </div>
                        <div class="cad-field-row">
                            <label class="cad-label">Wall Thickness</label>
                            <div class="cad-slider-row">
                                <input type="range" class="cad-slider" value="12">
                                <div class="cad-nested-input"><input type="text" value="0.12 in" readonly></div>
                                <div class="cad-icon-lock"><span class="material-symbols-outlined" style="font-size:14px;">lock_open</span></div>
                            </div>
                        </div>
                    </div>
                </section>
            </aside>

            <main class="cad-workspace">
                <div class="mock-viewport">FUSION 360</div>
            </main>
        </div>

        <footer style="height: 28px; background: rgba(30,30,30,0.9); backdrop-filter: blur(10px); border-top: 1px solid #444; display: flex; align-items: center; padding: 0 12px; gap: 10px;">
            <div class="cad-status-light"></div>
            <span style="font-size: 10px; font-weight: 800; color: #eee; letter-spacing: 0.05em;">BRIDGE LIVE</span>
            <div style="width:1px; height:14px; background:rgba(255,255,255,0.1);"></div>
            <span style="font-size: 10px; color: var(--cad-accent-blue); font-weight: 600;">ACTIVE: p02_05_chain</span>
            <div style="flex:1;"></div>
            <span style="font-size: 10px; color: #777; font-weight: 700;">NC v2.0.1</span>
        </footer>
    </div>
</body>
</html>
