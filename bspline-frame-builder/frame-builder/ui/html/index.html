<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hybrid Frame Builder</title>
        <link rel="stylesheet" href="../../../b-spline-gen/html/shared-style.css">
    <style>
      body,
      .app {
        background: var(--bg);
      }

      .app {
        display: flex !important;
        flex-direction: column !important;
        width: 100%;
        height: 100%;
      }

      aside {
        flex: 1 1 auto !important;
        min-height: 0 !important;
        padding-top: 10px !important;
      }

      .main-content {
        background: var(--surface) !important;
      }

      #resizer,
      #previewArea,
      #bottomStatusBar {
        display: none !important;
      }

      .face-status {
        padding: 0.45rem 0.6rem;
        border-radius: 0.45rem;
        background: rgba(255,255,255,0.08);
        color: var(--text);
        font-size: 0.9rem;
        min-height: 2.05rem;
        display: flex;
        align-items: center;
      }

      .face-status.selected {
        background: rgba(0, 160, 100, 0.16);
        color: var(--good);
        font-weight: 600;
      }

      #btn-select-face.selecting,
      #btn-select-face.selected {
        border-color: var(--good);
      }

      #btn-select-face.selecting {
        background: rgba(37, 99, 235, 0.12);
        color: var(--primary);
        box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.12);
        transform: translateY(1px);
      }

      #btn-select-face.selected {
        background: rgba(0, 160, 100, 0.12);
        color: var(--good);
      }

    </style>
</head>
<body>
    <div id="settings-panel" class="settings-panel hidden">
        <div class="settings-header">
            <span>Settings</span>
            <button id="close-settings-btn" class="lock-btn" type="button">✕</button>
        </div>
        <div class="settings-body">
                <div class="row">
                <label>Theme preview is applied instantly.</label>
            </div>
        </div>
    </div>
    <div id="settings-overlay" class="settings-overlay hidden"></div>

    <div class="app">
      <header>
        <span class="logo">Hybrid Frame Builder</span>
        <div style="flex:1;"></div>
        <div style="display:flex; gap:12px; align-items:center;">
          <button class="btn btn-primary btn-xs" id="header-action-btn" onclick="runBuild('sketch')" style="min-width: 120px; box-shadow: 0 4px 10px rgba(37,99,235,0.25);">BUILD SKETCH</button>
          <button class="btn btn-secondary btn-xs" id="settings-btn" title="Settings"
            style="height:32px; width:32px; padding:0; display:flex; align-items:center; justify-content:center; border-color:var(--accent); color:var(--accent);">⚙</button>
        </div>
      </header>

      <aside>
        <div class="tab-bar">
          <button class="tab-btn active" id="tab-form" onclick="switchTab('form')">SKETCH</button>
          <button class="tab-btn" id="tab-solidify" onclick="switchTab('solidify')">EXTRUDE</button>
        </div>

        <div class="main-content">
          <!-- SKETCH TAB -->
          <div id="content-form" class="tab-content active">
            <div class="panel panel-form">
              <div class="panel-header">Synthesis Strategy</div>
              <div class="panel-body">
                <div class="row">
                  <label>Rule Set</label>
                  <select id="template-select" style="width: 140px;" onchange="syncTemplate()">
                    <option value="Template 1">Template 1</option>
                    <option value="Template 2">Template 2</option>
                    <option value="Template 3">Template 3</option>
                    <option value="Template 4">Template 4</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="panel panel-spans">
              <div class="panel-header">Skeleton Spans <span id="constraint-count" style="margin-left:auto;color:var(--good);font-weight:600;">3/3 Locked</span></div>
              <div class="panel-body">
                <div class="slider-wrap">
                  <div class="slider-header">
                    <span class="slider-name">Shoulder Width</span>
                    <div class="flex-row">
                      <span class="slider-val" id="val-ShoulderSpan-label">80.0%</span>
                      <label class="lock-toggle">
                        <input type="checkbox" id="lock-ShoulderSpan" onchange="toggleLock('ShoulderSpan', this.checked)" checked>
                        LOCK
                      </label>
                    </div>
                  </div>
                  <div class="slider-container">
                    <input type="range" id="val-ShoulderSpan" min="0" max="150" step="0.5" value="80" oninput="updateLabel('ShoulderSpan')" onchange="updateFusion('ShoulderSpan')">
                  </div>
                </div>

                <div class="slider-wrap">
                  <div class="slider-header">
                    <span class="slider-name">Waist Width</span>
                    <div class="flex-row">
                      <span class="slider-val" id="val-WaistSpan-label">95.0%</span>
                      <label class="lock-toggle">
                        <input type="checkbox" id="lock-WaistSpan" onchange="toggleLock('WaistSpan', this.checked)" checked>
                        LOCK
                      </label>
                    </div>
                  </div>
                  <div class="slider-container">
                    <input type="range" id="val-WaistSpan" min="0" max="150" step="0.5" value="95" oninput="updateLabel('WaistSpan')" onchange="updateFusion('WaistSpan')">
                  </div>
                </div>

                <div class="slider-wrap">
                  <div class="slider-header">
                    <span class="slider-name">Hip Width</span>
                    <div class="flex-row">
                      <span class="slider-val" id="val-HipSpan-label">80.0%</span>
                      <label class="lock-toggle">
                        <input type="checkbox" id="lock-HipSpan" onchange="toggleLock('HipSpan', this.checked)" checked>
                        LOCK
                      </label>
                    </div>
                  </div>
                  <div class="slider-container">
                    <input type="range" id="val-HipSpan" min="0" max="150" step="0.5" value="80" oninput="updateLabel('HipSpan')" onchange="updateFusion('HipSpan')">
                  </div>
                </div>
              </div>
            </div>

            <div class="panel panel-heights">
              <div class="panel-header">Vertical Layout</div>
              <div class="panel-body">
                <div class="slider-wrap">
                  <div class="slider-header">
                    <span class="slider-name">Top Height</span>
                    <div class="flex-row">
                      <span class="slider-val" id="val-TopGap-label">15.0%</span>
                      <label class="lock-toggle">
                        <input type="checkbox" id="lock-TopGap" onchange="toggleLock('TopGap', this.checked)">
                        LOCK
                      </label>
                    </div>
                  </div>
                  <div class="slider-container">
                    <input type="range" id="val-TopGap" min="0" max="100" step="0.5" value="15" oninput="updateLabel('TopGap')" onchange="updateFusion('TopGap')">
                  </div>
                </div>

                <div class="slider-wrap">
                  <div class="slider-header">
                    <span class="slider-name">Waist Offset</span>
                    <div class="flex-row">
                      <span class="slider-val" id="val-WaistOffset-label">0.0%</span>
                    </div>
                  </div>
                  <div class="slider-container">
                    <input type="range" id="val-WaistOffset" min="-100" max="100" step="0.5" value="0" oninput="updateLabel('WaistOffset')" onchange="updateFusion('WaistOffset')">
                  </div>
                </div>

                <div class="slider-wrap">
                  <div class="slider-header">
                    <span class="slider-name">Bottom Height</span>
                    <div class="flex-row">
                      <span class="slider-val" id="val-BottomGap-label">15.0%</span>
                      <label class="lock-toggle">
                        <input type="checkbox" id="lock-BottomGap" onchange="toggleLock('BottomGap', this.checked)">
                        LOCK
                      </label>
                    </div>
                  </div>
                  <div class="slider-container">
                    <input type="range" id="val-BottomGap" min="0" max="100" step="0.5" value="15" oninput="updateLabel('BottomGap')" onchange="updateFusion('BottomGap')">
                  </div>
                </div>
              </div>
            </div>

          </div>

          <!-- EXTRUDE TAB -->
          <div id="content-solidify" class="tab-content">
            <div class="panel panel-surface">
              <div class="panel-header">Surface Mapping</div>
              <div class="panel-body">
                <div class="row">
                  <label>Target Face</label>
                  <button class="btn btn-secondary btn-xs" id="btn-select-face" style="flex: 0; white-space: nowrap;" onclick="pickFace()">SELECT FACE</button>
                </div>
                <div class="face-status" id="label-face-selection">No face selected...</div>
              </div>
            </div>

            <div class="panel panel-extrusion">
              <div class="panel-header">Extrusion Parameters</div>
              <div class="panel-body">
                <div class="row">
                  <label>Start Offset</label>
                  <input type="text" id="solid-offset" value="-1 in" style="width: 80px;">
                </div>
                <div class="row">
                  <label>Appearance</label>
                  <select id="solid-appearance" style="width: 140px;">
                    <option value="3D Ash - Unfinished">3D Ash - Unfinished</option>
                    <option value="3D Mahogany - Unfinished">3D Mahogany - Unfinished</option>
                    <option value="3D Pine - Unfinished">3D Pine - Unfinished</option>
                    <option value="3D Cherry - Unfinished">3D Cherry - Unfinished</option>
                    <option value="3D Maple - Unfinished">3D Maple - Unfinished</option>
                  </select>
                </div>
              </div>
            </div>

          </div>
        </div>
      </aside>

  <div id="bottomStatusBar">
      <span id="system-status">System Ready</span>
      <span id="version-label">v1.0.0 Unified</span>
  </div>
</div>

    <!-- UI Logic Script -->
    <script>
        // Global Error Tracker - Discretely logged to console
        window.addEventListener('error', function(event) {
            console.error('[JS ERR]', event.message, 'at', event.filename, ':', event.lineno);
        });

        window.fusionJavaScriptHandler = {
            handle: function(action, data) {
                const statusEl = document.getElementById('system-status');
                
                try {
                    if (!data) return "ERROR_NO_DATA";
                    const payload = typeof data === 'string' ? JSON.parse(data) : data;
                    
                    if (statusEl) statusEl.innerText = `[Fusion] ${action}`;

                    if (action === 'selection_result') {
                        if (payload.success) {
                            setFaceSelectionState('selected', payload.name, payload.count || 1);
                        } else {
                            setFaceSelectionState('none');
                        }
                    } else if (action === 'status_update') {
                        if (payload.msg && statusEl) statusEl.innerText = payload.msg;
                    }
                } catch(e) {
                    console.error('[Handler Error]', e.message);
                    return "ERROR_" + e.message;
                }

                return "OK";
            }
        };

        function switchTab(tabId) {
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            
            document.getElementById('tab-' + tabId).classList.add('active');
            document.getElementById('content-' + tabId).classList.add('active');

            // Contextual Header Button Update
            const actionBtn = document.getElementById('header-action-btn');
            if (actionBtn) {
                if (tabId === 'form') {
                    actionBtn.innerText = 'BUILD SKETCH';
                    actionBtn.onclick = () => runBuild('sketch');
                    updateConstraintStatus(); // Restore disabled state if needed
                } else {
                    actionBtn.innerText = 'GENERATE EXTRUDE 😊';
                    actionBtn.onclick = () => runBuild('solid');
                    actionBtn.disabled = false;
                    actionBtn.style.opacity = 1.0;
                }
            }
        }

        function updateLabel(id) {
            const val = document.getElementById('val-' + id).value;
            document.getElementById('val-' + id + '-label').innerText = parseFloat(val).toFixed(1) + '%';
        }

        function updateFusion(id) {
            const val = document.getElementById('val-' + id).value;
            notifyFusion('update_param', { name: id, value: val });
        }

        function toggleLock(id, isLocked) {
            const getLock = (name) => document.getElementById('lock-' + name);
            const input = getLock(id);

            if (isLocked) {
                // Rule 1: Waist excludes ALL heights
                if (id === 'WaistSpan') {
                    ['TopGap', 'BottomGap'].forEach(name => {
                        const l = getLock(name);
                        if (l.checked) {
                            l.checked = false;
                            notifyFusion('update_lock', { name: name, locked: false });
                            console.log('Mutual Exclusion: Locked Waist, released', name);
                        }
                    });
                }
                
                // Rule 2: Shoulder / Top Height conflict
                if (id === 'ShoulderSpan' && getLock('TopGap').checked) {
                    getLock('TopGap').checked = false;
                    notifyFusion('update_lock', { name: 'TopGap', locked: false });
                }
                if (id === 'TopGap') {
                    ['ShoulderSpan', 'WaistSpan'].forEach(name => {
                        const l = getLock(name);
                        if (l.checked) {
                            l.checked = false;
                            notifyFusion('update_lock', { name: name, locked: false });
                        }
                    });
                }

                // Rule 3: Hip / Bottom Height conflict
                if (id === 'HipSpan' && getLock('BottomGap').checked) {
                    getLock('BottomGap').checked = false;
                    notifyFusion('update_lock', { name: 'BottomGap', locked: false });
                }
                if (id === 'BottomGap') {
                    ['HipSpan', 'WaistSpan'].forEach(name => {
                        const l = getLock(name);
                        if (l.checked) {
                            l.checked = false;
                            notifyFusion('update_lock', { name: name, locked: false });
                        }
                    });
                }

                // Global MAX 3 logic (FIFO) - only if we are still over limit
                const activeLocks = Array.from(document.querySelectorAll('.lock-toggle input:checked'))
                    .filter(i => i.id !== 'lock-' + id);
                
                if (activeLocks.length >= 3) {
                    const oldest = activeLocks[0];
                    oldest.checked = false;
                    const oldestId = oldest.id.replace('lock-', '');
                    notifyFusion('update_lock', { name: oldestId, locked: false });
                }
            }

            input.checked = isLocked;
            updateConstraintStatus();
            notifyFusion('update_lock', { name: id, locked: isLocked });
        }

        function updateConstraintStatus() {
            const lockedCount = document.querySelectorAll('.lock-toggle input:checked').length;
            const label = document.getElementById('constraint-count');
            label.innerText = lockedCount + '/3 Locked';
            
            const actionBtn = document.getElementById('header-action-btn');
            label.style.color = lockedCount === 3 ? 'var(--good)' : 'var(--accent)';
            if (actionBtn) {
                actionBtn.disabled = lockedCount > 3;
                actionBtn.style.opacity = lockedCount > 3 ? 0.5 : 1.0;
            }
        }

        function togglePanel(header) {
            header.classList.toggle('collapsed');
            const body = header.nextElementSibling;
            if (body) body.classList.toggle('hidden');
        }

        document.querySelectorAll('.panel-header').forEach(header => {
            header.addEventListener('click', () => togglePanel(header));
        });

        function syncTemplate() {
            const tmpl = document.getElementById('template-select').value;
            notifyFusion('change_template', { template: tmpl });
        }

        function pickFace() {
            setFaceSelectionState('waiting');
            notifyFusion('pick_face', {});
        }

        // Settings Panel Toggle Logic
        document.getElementById('settings-btn')?.addEventListener('click', () => {
            document.getElementById('settings-panel')?.classList.toggle('hidden');
            document.getElementById('settings-overlay')?.classList.toggle('hidden');
        });
        document.getElementById('close-settings-btn')?.addEventListener('click', () => {
            document.getElementById('settings-panel')?.classList.add('hidden');
            document.getElementById('settings-overlay')?.classList.add('hidden');
        });
        document.getElementById('settings-overlay')?.addEventListener('click', () => {
            document.getElementById('settings-panel')?.classList.add('hidden');
            document.getElementById('settings-overlay')?.classList.add('hidden');
        });

        function setFaceSelectionState(state, name, count) {
            const label = document.getElementById('label-face-selection');
            const btn = document.getElementById('btn-select-face');
            btn.classList.remove('selecting', 'selected');
            label.classList.remove('selected');

            if (state === 'waiting') {
                label.innerText = 'Waiting for selection in Fusion...';
                btn.classList.add('selecting');
                btn.innerText = 'SELECTING...';
            } else if (state === 'selected') {
                const faceText = name || 'Face selected';
                label.innerText = count > 1 ? `${faceText} (${count} faces)` : faceText;
                label.classList.add('selected');
                btn.classList.add('selected');
                btn.innerText = 'SELECT FACE';
            } else {
                label.innerText = 'No face selected...';
                btn.innerText = 'SELECT FACE';
            }
        }

        function runBuild(type) {
            document.getElementById('system-status').innerText = 'Building ' + type + '...';
            
            let data = { type: type };
            if (type === 'solid') {
                data.offset = document.getElementById('solid-offset').value;
                data.appearance = document.getElementById('solid-appearance').value;
            }
            
            notifyFusion('run_build', data);
        }

        function notifyFusion(action, data) {
            const statusEl = document.getElementById('system-status');
            const logEl = document.getElementById('fusion-log');
            const payloadText = JSON.stringify(data);
            if (logEl) {
                logEl.innerText = `[UI] sending ${action} -> ${payloadText}`;
            }
            const hasPostMessage = (typeof adsk !== 'undefined' && adsk.fusion && typeof adsk.fusion.postMessage === 'function');
            const hasFusionSendData = (typeof adsk !== 'undefined' && typeof adsk.fusionSendData === 'function');

            if (hasPostMessage) {
                try {
                    adsk.fusion.postMessage(action, JSON.stringify(data));
                    if (statusEl) statusEl.parentElement.style.background = 'rgba(0,0,0,0.2)'; // Normal
                } catch (e) {
                    if (statusEl) statusEl.innerText = 'BRIDGE ERROR';
                    if (statusEl) statusEl.parentElement.style.background = 'var(--bad)';
                }
            } else if (hasFusionSendData) {
                try {
                    adsk.fusionSendData(action, JSON.stringify(data)).then(() => {
                        if (statusEl) statusEl.parentElement.style.background = 'rgba(0,0,0,0.2)';
                    }).catch(() => {
                        if (statusEl) statusEl.innerText = 'BRIDGE ERROR';
                        if (statusEl) statusEl.parentElement.style.background = 'var(--bad)';
                    });
                } catch (e) {
                    if (statusEl) statusEl.innerText = 'BRIDGE ERROR';
                    if (statusEl) statusEl.parentElement.style.background = 'var(--bad)';
                }
            } else {
                console.warn('[BRIDGE] Fusion 360 bridge missing');
                if (statusEl) statusEl.innerText = 'BRIDGE MISSING';
                if (statusEl) statusEl.parentElement.style.background = 'var(--bad)';
            }
        }

        // Initialization: Enforce 3-lock limit on open
        window.addEventListener('DOMContentLoaded', () => {
            const locks = document.querySelectorAll('.lock-toggle input');
            let checkedCount = 0;
            locks.forEach(lock => {
                if (lock.checked) {
                    if (checkedCount >= 3) {
                        lock.checked = false; // Prune surplus defaults
                    } else {
                        checkedCount++;
                    }
                }
            });
            updateConstraintStatus();
        });
    </script>
</body>
</html>
